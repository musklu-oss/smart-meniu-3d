<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Meniu 3D</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

  <div class="page">

    <header class="header">
      <span class="restaurant-name">Restaurant Demo</span>
    </header>

    <div class="viewer-wrap">
      <model-viewer
        id="viewer"
        src="assets/models/ballotin_of_saithe_with_herbs.glb"
        ios-src="assets/models/Ballotin_of_saithe_with_herbs.usdz"
        alt="Ballotin of Saithe with Herbs"
        camera-controls
        auto-rotate
        auto-rotate-delay="1000"
        rotation-per-second="20deg"
        shadow-intensity="1"
        camera-orbit="0deg 70deg 105%"
        min-field-of-view="25deg"
        max-field-of-view="45deg"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="fixed">
        <button slot="ar-button" class="ar-button">
          &#x1F4F1; Vezi pe masa ta
        </button>
      </model-viewer>
    </div>

    <div class="product-info">
      <h1 class="product-name">Ballotin of Saithe with Herbs</h1>
      <p class="product-description">File de cod negru pregătit cu unt de ierburi aromate, servit cu garnitură de legume de sezon.</p>
      <div class="product-footer">
        <span class="product-price">52 RON</span>
        <span class="product-badge">Recomandat</span>
      </div>
    </div>

  </div>

</body>
</html>
