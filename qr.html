<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Meniu 3D — QR Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .card h1 {
      font-size: 18px;
      font-weight: 700;
      color: #e8c97a;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    #qr-container {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .url {
      font-size: 11px;
      color: #555;
      word-break: break-all;
      margin-bottom: 24px;
    }
    .instructions {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      border-top: 1px solid #2a2a2a;
      padding-top: 20px;
    }
    .instructions strong { color: #e8c97a; }
    @media print {
      body { background: #fff; }
      .card {
        background: #fff;
        border: none;
        color: #000;
      }
      .card h1 { color: #000; }
      .url { color: #333; }
      .instructions { color: #444; border-color: #ddd; }
      .instructions strong { color: #000; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Smart Meniu 3D</h1>
    <p>Scanează pentru a vedea preparatul în 3D</p>
    <div id="qr-container">
      <canvas id="qr"></canvas>
    </div>
    <div class="url" id="url-display"></div>
    <div class="instructions">
      <strong>Cum funcționează:</strong><br>
      1. Scanează QR-ul cu telefonul<br>
      2. Permite accesul la cameră<br>
      3. Îndreaptă camera spre imaginea produsului<br>
      4. Modelul 3D apare pe meniu ✨
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const AR_URL = 'https://musklu-oss.github.io/smart-meniu-3d/';

    document.getElementById('url-display').textContent = AR_URL;

    QRCode.toCanvas(document.getElementById('qr'), AR_URL, {
      width: 200,
      margin: 1,
      color: { dark: '#000000', light: '#ffffff' }
    }, function(err) {
      if (err) console.error(err);
    });
  </script>
</body>
</html>
